name: daily_english_quest
description: A polished mobile learning game for practicing everyday English conversations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  uuid: ^4.5.1
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_tts: ^4.2.2
  connectivity_plus: ^6.1.1
  json_annotation: ^4.9.0
  llamadart: ^0.8.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
